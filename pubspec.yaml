name: openim_sdk
description: An instant messaging plug-in that supports Android and IOS. And the server is also all open source.
version: 1.1.0
homepage: https://jsontodart.cn
repository: https://github.com/Matkurban/openim_sdk
topics: [openim, im, sdk, flutter]

environment:
  sdk: ^3.11.1

dependencies:
  equatable: ^2.0.8
  json_annotation: ^4.11.0
  synchronized: ^3.4.0
  tostore: ^3.0.8
  path: ^1.9.0
  get_it: ^9.2.1
  logging: ^1.3.0
  universal_platform: ^1.1.0
  web_socket_channel: ^3.0.3
  dio: ^5.9.2
  crypto: ^3.0.7
  talker_dio_logger: ^5.1.15
  path_provider: ^2.1.5
  protobuf: ^6.0.0
  protoc_plugin: ^25.0.0
  fixnum: ^1.1.1
  meta: ^1.17.0

dev_dependencies:
  build_runner: ^2.12.2
  json_serializable: ^6.13.0
  lints: ^6.0.0
  test: ^1.25.6
