name: openim_sdk
description: An instant messaging plug-in that supports Android and IOS. And the server is also all open source.
version: 1.0.0
homepage: https://jsontodart.cn
repository: https://github.com/Matkurban/openim_sdk
topics: [openim, im, sdk, flutter]

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.8
  json_annotation: ^4.11.0
  synchronized: ^3.4.0
  tostore: ^3.1.0
  path: ^1.9.1
  get_it: ^9.2.1
  universal_platform: ^1.1.0
  web_socket_channel: ^3.0.3
  dio: ^5.9.2
  crypto: ^3.0.7
  talker_dio_logger: ^5.1.16
  path_provider: ^2.1.5
  protobuf: ^6.0.0
  protoc_plugin: ^25.0.0
  fixnum: ^1.1.1
  meta: any
  aoiwe_logger: ^1.0.1

dev_dependencies:
  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  lints: ^6.1.0
  test: ^1.31.0
